services:
  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: truthpuzzle
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d truthpuzzle"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  meilisearch:
    image: getmeili/meilisearch:v1.13
    restart: unless-stopped
    environment:
      MEILI_NO_ANALYTICS: "true"
    ports:
      - "7700:7700"
    volumes:
      - meili_data:/meili_data

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:password@db:5432/truthpuzzle
      REDIS_URL: redis://redis:6379/0
      SEARCH_ENGINE_URL: http://meilisearch:7700
      BACKEND_CORS_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    command: ["/app/docker-entrypoint.sh"]
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=5).read()",
        ]
      interval: 10s
      timeout: 5s
      retries: 10

  celery_worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:password@db:5432/truthpuzzle
      REDIS_URL: redis://redis:6379/0
      SEARCH_ENGINE_URL: http://meilisearch:7700
      BACKEND_CORS_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
    depends_on:
      backend:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["celery", "-A", "app.tasks.celery_app", "worker", "-l", "info", "-c", "4"]
    healthcheck:
      disable: true

  celery_beat:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:password@db:5432/truthpuzzle
      REDIS_URL: redis://redis:6379/0
      SEARCH_ENGINE_URL: http://meilisearch:7700
      BACKEND_CORS_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
    depends_on:
      backend:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["celery", "-A", "app.tasks.celery_app", "beat", "-l", "info"]
    healthcheck:
      disable: true

  frontend:
    build: ./frontend
    restart: unless-stopped
    environment:
      VITE_API_BASE_URL: http://localhost:8000
      VITE_WS_URL: ws://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/"]
      interval: 10s
      timeout: 5s
      retries: 10

  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    profiles: ["ollama"]
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
  meili_data:
  ollama_data:
